<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>CATEA — Mini-Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="games">

<a href="#main-content" class="skip-link">Pular para conteúdo principal</a>
<div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

<!-- NAV -->
<nav class="nav" role="navigation" aria-label="Navegação principal">
  <div class="nav-logo" onclick="showPage('dashboard')">CATEA 🌿</div>
  <div class="nav-actions">
    <button class="nav-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Alternar tema" title="Tema">🌙</button>
    <button class="nav-btn" onclick="showPage('settings')" aria-label="Configurações">⚙️</button>
    <button class="nav-btn" onclick="showPage('achievements')" aria-label="Conquistas">🏅</button>
    <div class="nav-avatar" onclick="showPage('profile')" role="button" tabindex="0" aria-label="Meu perfil">🦋</div>
  </div>
</nav>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="Navegação rápida">
  <button class="bottom-nav-btn" onclick="showPage('dashboard')" aria-label="Início"><span class="bottom-nav-icon">🏠</span>Início</button>
  <button class="bottom-nav-btn active" onclick="showPage('games')" aria-label="Jogos"><span class="bottom-nav-icon">🎮</span>Jogos</button>
  <button class="bottom-nav-btn" onclick="showPage('profile')" aria-label="Perfil"><span class="bottom-nav-icon">🦋</span>Perfil</button>
  <button class="bottom-nav-btn" onclick="showPage('settings')" aria-label="Configurações"><span class="bottom-nav-icon">⚙️</span>Ajustes</button>
</nav>

<!-- COMFORT MODAL -->
<div class="comfort-modal" id="comfortModal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="comfort-title">
  <div class="comfort-card">
    <h2 class="comfort-title" id="comfort-title">Como você quer jogar? 🌟</h2>
    <p class="comfort-sub">Escolha o que faz você se sentir mais confortável agora</p>
    <div class="comfort-options" role="radiogroup">
      <button class="comfort-opt" onclick="startGame('unknown')">
        <span class="comfort-opt-icon">🌍</span>
        <div class="comfort-opt-text"><strong>Com desconhecidos</strong><span>Conhecer pessoas novas que também adoram jogos</span></div>
      </button>
      <button class="comfort-opt" onclick="startGame('friends')">
        <span class="comfort-opt-icon">💚</span>
        <div class="comfort-opt-text"><strong>Só com amigos</strong><span>Jogar com pessoas da sua lista de amigos</span></div>
      </button>
      <button class="comfort-opt" onclick="startGame('ai')">
        <span class="comfort-opt-icon">🤖</span>
        <div class="comfort-opt-text"><strong>Com a IA CATEA</strong><span>Praticar e se divertir sem pressão social</span></div>
      </button>
      <button class="comfort-opt" onclick="startGame('silent')">
        <span class="comfort-opt-icon">🔇</span>
        <div class="comfort-opt-text"><strong>Modo Silencioso</strong><span>Sem chat, só ações. Máximo de calma</span></div>
      </button>
    </div>
    <button class="btn btn-ghost w-full" onclick="closeComfort()" style="margin-top:16px;width:100%">Cancelar</button>
  </div>
</div>

<main id="main-content" class="page-enter" style="padding-top:80px;min-height:100vh">
  <div style="max-width:1000px;margin:0 auto;padding:40px 24px">
    <div style="margin-bottom:40px">
      <h1 style="font-family:var(--font-title);font-size:2rem;font-weight:800;margin-bottom:8px">Mini-Games 🎮</h1>
      <p style="color:var(--text2)">Jogos cooperativos de 2 a 5 minutos. Sem competição, só alegria!</p>
    </div>
    <div class="games-grid" id="allGamesGrid" role="list" aria-label="Todos os mini-games"></div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
