<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>CATEA — Aguardando…</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="waiting">

<a href="#main-content" class="skip-link">Pular para conteúdo principal</a>
<div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

<nav class="nav" role="navigation" aria-label="Navegação principal">
  <div class="nav-logo" onclick="showPage('dashboard')">CATEA 🌿</div>
  <div class="nav-actions">
    <button class="nav-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Alternar tema">🌙</button>
    <button class="nav-btn" onclick="showPage('settings')" aria-label="Configurações">⚙️</button>
    <div class="nav-avatar" onclick="showPage('profile')" role="button" tabindex="0" aria-label="Meu perfil">🦋</div>
  </div>
</nav>

<main id="main-content" class="page-enter">
  <div class="waiting-wrap">
    <div class="waiting-card">
      <div class="waiting-anim" aria-hidden="true">🌸</div>
      <h1 style="font-family:var(--font-title);font-size:1.6rem;font-weight:800;margin-bottom:12px" id="waitingTitle">Encontrando seu parceiro…</h1>
      <p style="color:var(--text2);margin-bottom:24px" id="waitingMsg">Estamos procurando alguém com interesses parecidos com os seus 🌈</p>
      <div class="waiting-dots" aria-hidden="true">
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
      </div>
      <button class="btn btn-ghost w-full" style="margin-top:32px;width:100%" onclick="showPage('games')">Cancelar</button>
    </div>
  </div>
</main>

<script src="app.js"></script>
<script>
  // Auto-redirect after match found
  setTimeout(() => {
    showToast('🌟','Parceiro encontrado! Iniciando jogo…');
    setTimeout(() => showPage('gameroom'), 1000);
  }, 2500);
</script>
</body>
</html>
