<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>CATEA — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="login">

<a href="#main-content" class="skip-link">Pular para conteúdo principal</a>
<div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

<main id="main-content" class="page-enter">
  <div class="auth-wrap">
    <div class="auth-card" role="main">

      <div class="auth-logo" aria-label="CATEA">CATEA 🌿</div>
      <p class="auth-tagline">Seu espaço calmo de conexão</p>

      <!-- ── Login com Google ───────────────────────────── -->
      <button
        class="social-btn"
        aria-label="Entrar com Google"
        onclick="quickLogin(event)"
      >
        <span aria-hidden="true">🔵</span> Entrar com Google
      </button>

      <!-- ── Login Anônimo ─────────────────────────────── -->
      <button
        class="social-btn"
        aria-label="Entrar anonimamente"
        onclick="quickLogin(event)"
      >
        <span aria-hidden="true">🌙</span> Entrar como anônimo (sem cadastro)
      </button>

      <div class="auth-divider">ou com e-mail</div>

      <!-- ── Formulário e-mail/senha ───────────────────── -->
      <div id="loginForm">
        <div class="form-group">
          <label for="loginEmail">E-mail</label>
          <input
            type="email"
            id="loginEmail"
            class="input"
            placeholder="seu@email.com"
            aria-required="true"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="loginPass">Senha</label>
          <input
            type="password"
            id="loginPass"
            class="input"
            placeholder="••••••••"
            aria-required="true"
            autocomplete="current-password"
          />
        </div>

        <!-- Botão chama loginWithEmail via quickLogin sem aria-label especial -->
        <button
          class="btn btn-primary w-full"
          style="width:100%"
          onclick="quickLogin(event)"
          aria-label="Entrar com e-mail"
        >
          🌟 Entrar
        </button>
      </div>

      <p class="auth-link">Não tem conta? <a href="register.html">Criar agora — é grátis!</a></p>
      <p class="auth-link"><a href="index.html">← Voltar para o início</a></p>

    </div>
  </div>
</main>

<!--
  ⚠️  IMPORTANTE: use type="module" para que o import do Firebase funcione.
  Certifique-se de servir os arquivos via HTTP(S), não file://.
-->
<script type="module" src="app.js"></script>

</body>
</html>
